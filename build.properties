# Project paths
project.name=task-tracker
src.main.kotlin=src/main/kotlin
src.main.resources=src/main/resources
build.dir=build
classes.dir=${build.dir}/classes
resources.dir=${build.dir}/resources
dist.dir=${build.dir}/dist
lib.dir=lib

# Tool paths
kotlin.home=tools/kotlin
kotlin.lib=${kotlin.home}/lib
spring.boot.antlib.jar=tools/spring-boot-antlib/spring-boot-antlib-4.0.4.jar
ivy.jar.file=/opt/homebrew/Cellar/ivy/2.5.3/libexec/ivy-2.5.3.jar

# Dependencies versions
jsonwebtokenVersion=0.12.6
jaxbApiVersion=2.3.1
mapstructVersion=1.6.3
kotlinxSerializationVersion=1.9.0
kotlinxCoroutinesVersion=1.10.2
dotenvSpringVersion=3.0.0
javaxAnnotationVersion=1.3.2

# Compiler settings
kotlin.jvm.target=21
kotlin.compiler.args=-Xjsr305=strict -Xannotation-default-target=param-property

# Manifest settings (чувствительные данные)
main.class=org.esc.tasktracker.EscTaskTrackerApplication
jar.launcher=org.springframework.boot.loader.JarLauncher
spring.boot.version=4.0.4